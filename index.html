<!DOCTYPE html>
<h3 class="m0">Dettes de rattrapage</h3>
<p class="muted mt-6">Quand un tour est remplacé, la personne remplacée gagne +1 en « À rattraper ».</p>
<div class="row wrap" id="debtsRow"></div>
<div class="row mt12">
<select id="debtWho">
<option value="Nathan">Nathan</option>
<option value="Anna">Anna</option>
<option value="Aaron">Aaron</option>
</select>
<select id="debtDelta">
<option value="-1">Utiliser 1 rattrapage (−1)</option>
<option value="1">Ajouter manuellement (+1)</option>
<option value="-2">Utiliser 2 (−2)</option>
<option value="-3">Utiliser 3 (−3)</option>
</select>
<button class="success" id="applyDebt">Appliquer</button>
</div>
</div>
</div>


<div class="col-4">
<div class="card">
<div class="row between centerY">
<h3 class="m0">Historique</h3>
<div class="row gap8">
<button class="ghost tiny" id="exportBtn">Exporter</button>
<label class="chip" for="importFile">Importer JSON <input id="importFile" type="file" accept="application/json" style="display:none"></label>
<button class="danger tiny" id="resetBtn">Tout réinitialiser</button>
</div>
</div>
<div class="scroll">
<table id="history">
<thead>
<tr>
<th>Date</th><th>Tâche</th><th>Prévu</th><th>Réalisé par</th><th>Remplacement</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
<div class="footer">Données locales (localStorage). Branche une base plus tard via `api.save`/`api.load`.</div>
</div>
</div>
</section>
</main>


<template id="taskRowTpl">
<div class="task" data-task="">
<div class="left">
<div>
<div class="name task-title"></div>
<small>Prévu : <span class="scheduled"></span></small>
</div>
</div>
<div class="flex">
<label class="muted">Remplacé par</label>
<select class="who">
<option value="">— Personne (fait par la personne prévue) —</option>
<option value="Nathan">Nathan</option>
<option value="Anna">Anna</option>
<option value="Aaron">Aaron</option>
<option value="Papa">Papa</option>
<option value="Maman">Maman</option>
<option value="Autre">Autre…</option>
</select>
<button class="primary save">Enregistrer</button>
</div>
</div>
</template>


<script src="/app.js"></script>
</body>
</html>
